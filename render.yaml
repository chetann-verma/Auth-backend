services:
  - type: web
    name: authentication-system-backend
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /auth/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: "3600000"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend-domain.vercel.app"
      - key: JPA_DDL_AUTO
        value: "update"
      # Set these to your managed database values in Render dashboard.
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_DRIVER
        value: "org.postgresql.Driver"


