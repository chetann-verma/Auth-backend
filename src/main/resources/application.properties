spring.application.name=Authentication_System

# Default local DB is H2; override with PostgreSQL values in Render env vars.
spring.datasource.url=${DB_URL:jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}

app.jwt.secret=${JWT_SECRET:VGhpc0lzQVN1cGVyTG9uZ0RlZmF1bHRCYXNlNjRTZWNyZXRLZXlGb3JKV1QxMjM0NTY3ODkw}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:https://*.ngrok-free.dev,https://*.ngrok-free.app,https://*.ngrok.io}

server.port=${PORT:8080}

